<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог роз</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    <link rel="stylesheet" href="css/templatemo-style.css">
    <link rel="stylesheet" href="assets/css/rosy.css">
</head>
<body>
    <!-- Page Loader -->
    <div id="loader-wrapper">
        <div id="loader"></div>
        <div class="loader-section section-left"></div>
        <div class="loader-section section-right"></div>
    </div>

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-seedling mr-2"></i>
                ROS
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ml-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link nav-link-1 active" aria-current="page" href="index.html">Каталог</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-4 position-relative" href="cart.html">
                            Корзина
                            <span id="cartCount" class="badge rounded-pill bg-danger" hidden></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="tm-hero d-flex justify-content-center align-items-center" data-parallax="scroll" data-image-src="img/hero-roses.svg">
        <form class="d-flex tm-search-form" onsubmit="return false">
            <input id="q" class="form-control tm-search-input" type="search" placeholder="Поиск по названию" aria-label="Search">
            <button class="btn btn-outline-success tm-search-btn" type="button" aria-label="Search button">
                <i class="fas fa-search"></i>
            </button>
        </form>
    </div>

    <div class="container-fluid tm-container-content tm-mt-60">
        <div class="row mb-4">
            <h2 class="col-12 tm-text-primary">Каталог роз</h2>
        </div>

        <div class="row mb-4 g-3">
            <div class="col-12 col-md-3">
                <label class="tm-text-primary mb-2 d-block" for="color">Цвет</label>
                <select id="color" class="form-control rounded-0">
                    <option value="">Любой</option>
                </select>
            </div>
            <div class="col-12 col-md-3">
                <label class="tm-text-primary mb-2 d-block" for="category">Категория</label>
                <select id="category" class="form-control rounded-0">
                    <option value="">Все</option>
                </select>
            </div>
            <div class="col-6 col-md-2">
                <label class="tm-text-primary mb-2 d-block" for="hMin">Высота от</label>
                <input id="hMin" type="number" inputmode="numeric" min="0" class="form-control rounded-0" placeholder="см">
            </div>
            <div class="col-6 col-md-2">
                <label class="tm-text-primary mb-2 d-block" for="hMax">Высота до</label>
                <input id="hMax" type="number" inputmode="numeric" min="0" class="form-control rounded-0" placeholder="см">
            </div>
            <div class="col-12 col-md-3">
                <label class="tm-text-primary mb-2 d-block" for="bloomType">Тип цветения</label>
                <select id="bloomType" class="form-control rounded-0">
                    <option value="">Любой</option>
                </select>
            </div>
            <div class="col-12 col-md-2">
                <label class="tm-text-primary mb-2 d-block" for="sort">Сортировка</label>
                <select id="sort" class="form-control rounded-0">
                    <option value="popularity_desc">Популярные</option>
                    <option value="new_desc">Новинки</option>
                    <option value="price_asc">Цена ↑</option>
                    <option value="price_desc">Цена ↓</option>
                    <option value="name_asc">Название A‑Я</option>
                </select>
            </div>
        </div>

        <p id="status" class="tm-text-gray" role="status"></p>

        <div class="row tm-mb-90 tm-gallery" id="grid" aria-live="polite"></div>

        <div class="row tm-mb-90">
            <div class="col-12">
                <div class="tm-bg-gray p-5 text-center rosy-cta">
                    <h2 class="tm-text-primary mb-3">Заказать саженцы</h2>
                    <p class="tm-text-gray mb-4">Напишите — ответим и поможем подобрать сорта.</p>
                    <div class="rosy-cta__buttons">
                        <a class="btn btn-primary rosy-btn-wa" target="_blank" rel="noopener"
                           href="https://wa.me/79384096708?text=%D0%97%D0%B4%D1%80%D0%B0%D0%B2%D1%81%D1%82%D0%B2%D1%83%D0%B9%D1%82%D0%B5!%20%D0%98%D0%BD%D1%82%D0%B5%D1%80%D0%B5%D1%81%D1%83%D0%B5%D1%82%20%D0%BA%D0%B0%D1%82%D0%B0%D0%BB%D0%BE%D0%B3%20%D1%80%D0%BE%D0%B7%202026">
                            <i class="fab fa-whatsapp mr-1"></i> WhatsApp (Максим)
                        </a>
                        <a class="btn btn-outline-primary" target="_blank" rel="noopener"
                           href="https://t.me/share/url?url=https%3A%2F%2Flesnikovmn-svg.github.io%2Frosy-catalog-2026%2F&text=%D0%97%D0%B4%D1%80%D0%B0%D0%B2%D1%81%D1%82%D0%B2%D1%83%D0%B9%D1%82%D0%B5!%20%D0%98%D0%BD%D1%82%D0%B5%D1%80%D0%B5%D1%81%D1%83%D0%B5%D1%82%20%D0%BA%D0%B0%D1%82%D0%B0%D0%BB%D0%BE%D0%B3%20%D1%80%D0%BE%D0%B7%202026">
                            <i class="fab fa-telegram mr-1"></i> Telegram (Кирилл)
                        </a>
                    </div>
                    <div class="tm-text-gray small mt-3">WhatsApp: Максим · Telegram: @KIRILLGRIGORIEVICH</div>
                </div>
            </div>
        </div>
    </div>

    <footer class="tm-bg-gray pt-5 pb-3 tm-text-gray tm-footer">
        <div class="container-fluid tm-container-small">
            <div class="row">
                <div class="col-12 px-5 mb-3">
                    Каталог саженцев роз на весну 2026
                </div>
            </div>
        </div>
    </footer>

    <script src="js/plugins.js"></script>
    <script>
        // Быстрее убираем лоадер: не ждём загрузку всех картинок/шрифтов.
        document.addEventListener("DOMContentLoaded", function () {
            document.body.classList.add("loaded");
        });
        // Фолбэк на случай, если DOMContentLoaded уже прошёл.
        window.addEventListener("load", function () {
            document.body.classList.add("loaded");
        });
        // Последний фолбэк, чтобы лоадер не “зависал”.
        window.setTimeout(function () {
            document.body.classList.add("loaded");
        }, 2500);
    </script>
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
