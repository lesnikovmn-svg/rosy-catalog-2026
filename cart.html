<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    <link rel="stylesheet" href="css/templatemo-style.css">
    <link rel="stylesheet" href="assets/css/rosy.css">
</head>
<body>
    <!-- Page Loader -->
    <div id="loader-wrapper">
        <div id="loader"></div>
        <div class="loader-section section-left"></div>
        <div class="loader-section section-right"></div>
    </div>

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-seedling mr-2"></i>
                ROS
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ml-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link nav-link-1" href="index.html">Каталог</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-4 active position-relative" aria-current="page" href="cart.html">
                            Корзина
                            <span id="cartCount" class="badge rounded-pill bg-danger" hidden></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="tm-hero d-flex justify-content-center align-items-center" data-parallax="scroll" data-image-src="img/hero.jpg"></div>

    <div class="container-fluid tm-container-content tm-mt-60">
        <div class="row mb-4">
            <h2 class="col-12 tm-text-primary">Корзина</h2>
        </div>

        <div class="row tm-mb-50">
            <div class="col-12 mb-4" id="cart"></div>
        </div>

        <div class="row mb-4">
            <h2 class="col-12 tm-text-primary">Оформление заказа</h2>
            <p class="col-12 tm-text-gray">Доставка и скидки пока рассчитываются вручную (заглушка).</p>
        </div>

        <div class="row tm-mb-50">
            <div class="col-lg-6 col-12 mb-5">
                <form id="checkoutForm" class="tm-contact-form mx-auto" autocomplete="on">
                    <div class="form-group">
                        <input type="text" name="customer_name" class="form-control rounded-0" placeholder="Имя" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" class="form-control rounded-0" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="phone" class="form-control rounded-0" placeholder="Телефон" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="address" class="form-control rounded-0" placeholder="Адрес доставки" required>
                    </div>
                    <div class="form-group">
                        <textarea rows="4" name="comment" class="form-control rounded-0" placeholder="Комментарий"></textarea>
                    </div>
                    <div class="form-group tm-text-right">
                        <button type="submit" class="btn btn-primary">Отправить заказ</button>
                        <a class="btn btn-outline-secondary ml-2" href="index.html">Продолжить покупки</a>
                    </div>
                    <p id="checkoutStatus" class="tm-text-gray" role="status"></p>
                </form>

                <iframe title="order-submit" id="orderFrame" name="orderFrame" class="d-none"></iframe>
                <form id="orderPostForm" class="d-none" method="POST" target="orderFrame">
                    <input type="hidden" name="action" value="order" />
                    <input type="hidden" name="payload" value="" />
                </form>
            </div>
        </div>
    </div>

    <footer class="tm-bg-gray pt-5 pb-3 tm-text-gray tm-footer">
        <div class="container-fluid tm-container-small">
            <div class="row">
                <div class="col-12 px-5 mb-3">
                    Каталог саженцев роз на весну 2026
                </div>
            </div>
        </div>
    </footer>

    <script src="js/plugins.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.body.classList.add("loaded");
        });
        window.addEventListener("load", function () {
            document.body.classList.add("loaded");
        });
        window.setTimeout(function () {
            document.body.classList.add("loaded");
        }, 2500);
    </script>
    <script type="module" src="assets/js/cartPage.js"></script>
</body>
</html>
